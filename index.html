<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner do Mercado</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <h1>🛒 App Compra Inteligente</h1>

    <div class="box-padrao" style="padding: 15px;">
        <label for="limite-orcamento" style="font-weight: bold; color: #475569; font-size: 15px;">Qual o limite de gastos hoje?</label>
        <div style="display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px;">
            <strong style="font-size: 20px; color: #333;">R$</strong>
            <input type="number" id="limite-orcamento" value="150.00" step="10" onchange="atualizarTelaDoCarrinho()" style="width: 120px; margin: 0; font-weight: bold; color: #ef4444;">
        </div>
    </div>
    
    <div class="box-padrao" style="padding: 15px;">
        <label for="quantidade-item" style="font-weight: bold; color: #475569; font-size: 15px;">Quantidade do próximo item:</label>
        <div style="display: flex; justify-content: center; align-items: center; margin-top: 10px; gap: 15px;">
            <button onclick="mudarQuantidade(-1)" class="btn-contador">-</button>
            <input type="number" id="quantidade-item" value="1" min="1" style="width: 60px; margin: 0; font-weight: bold;">
            <button onclick="mudarQuantidade(1)" class="btn-contador">+</button>
        </div>
    </div>

    <div id="reader"></div>

    <div id="resultado-area">
        Código Lido: <span id="codigo-lido"></span>
    </div>

    <div class="box-padrao">
        <p style="margin-top: 0; color: #475569; font-weight: bold;">Câmera não leu? Digite o código:</p>
        <input type="number" id="codigo-manual" placeholder="Ex: 7891234567890">
        <button class="btn-acao btn-primario" onclick="buscarManual()">Adicionar Item</button>
    </div>

    <div id="carrinho" class="box-padrao" style="border: 2px solid transparent;">
        <h2 style="margin-top: 0; color: #1e293b; font-size: 18px;">Meu Carrinho</h2>
        <ul id="itens-carrinho" style="list-style: none; padding: 0; margin-bottom: 20px;"></ul>
        <h2 style="text-align: right; color: #1e293b; margin: 0; margin-bottom: 20px; font-size: 20px;" id="texto-total">Total: R$ <span id="valor-total">0,00</span></h2>
        
        <button class="btn-acao btn-sucesso" onclick="finalizarCompra()">✅ Finalizar Compra</button>
    </div>

    <button class="btn-acao btn-secundario" style="max-width: 400px;" onclick="abrirHistorico()">📜 Ver Histórico de Compras</button>

    <div id="modal-historico" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharHistorico()">&times;</span>
            <h2 style="margin-top: 0; color: #1e293b; text-align: center; font-size: 18px;">Histórico de Compras</h2>
            <div id="lista-historico"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
